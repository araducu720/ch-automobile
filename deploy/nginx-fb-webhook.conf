# Nginx snippet for the Facebook webhook location
# Add inside your server {} block if you need a dedicated path
# (Forge handles the main PHP-FPM config automatically)

location /webhooks/facebook {
    # Allow Meta's IP ranges (not strictly required but adds a layer of trust)
    # Meta publishes their IP ranges at: https://developers.facebook.com/docs/graph-api/webhooks/
    try_files $uri $uri/ /index.php?$query_string;

    # Increase buffer to handle large batch webhook payloads
    client_max_body_size 2M;
}
